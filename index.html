<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0c0e" />
    <title>Mana Chart — Topster-style MTG card-art collage builder</title>
    <meta
      name="description"
      content="Build, arrange, and export Topster-style collages of Magic: The Gathering card art. Search Scryfall or import a decklist, then share your chart with a link."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mana Chart — MTG card-art collage builder" />
    <meta
      property="og:description"
      content="Build, arrange, and export Topster-style collages of Magic: The Gathering card art, then share them with a link."
    />
    <meta property="og:url" content="https://manachart.app" />
    <!-- TODO: og-image.png still shows the old "MTG Chart" / mtgchart.com branding baked
         into the artwork — needs a re-rendered 1200×630 image with "Mana Chart" / manachart.app -->
    <meta property="og:image" content="https://manachart.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mana Chart — MTG card-art collage builder" />
    <meta
      name="twitter:description"
      content="Build, arrange, and export Topster-style collages of Magic: The Gathering card art, then share them with a link."
    />
    <meta name="twitter:image" content="https://manachart.app/og-image.png" />

    <div id="root"></div>
